server:
  port: 8080 # Cổng mặc định của Backend

# Các cấu hình cũ của bạn (spring, server, mail...) vẫn giữ nguyên ở trên
# ...
manga:
  app:
    jwtSecret: NGVwYjN6YzhxMnB4OXU1aWp2bThkaWZrNnBoMmduOHltdmwycTM4ajYxazA= 
    jwtExpirationMs: 86400000

spring:
  datasource:
    url: jdbc:sqlserver://${DB_HOST}:${DB_PORT};databaseName=${DB_NAME};encrypt=true;trustServerCertificate=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        '[format_sql]': true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Cấu hình giới hạn dung lượng file upload (Cho tính năng Upload trang truyện Manga)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
